<!DOCTYPE html>
<html lang="zh-CN" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal.MD | Signal, Not Noise.</title>
    <script src="static/lib/tailwindcss.js"></script>
    <link rel="stylesheet" href="static/lib/fontawesome.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bg-primary': '#0f0f10',
                        'bg-secondary': '#1a1a1c',
                        'accent': '#5e6ad2', // Linear Purple
                        'text-primary': '#e1e1e3',
                        'text-secondary': '#8a8a8e',
                        'border-color': '#2e2e32'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body { background-color: #0f0f10; color: #e1e1e3; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2e2e32; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3e3e42; }

        .card-hover:hover {
            background-color: #1a1a1c;
            border-color: #3e3e42;
        }

        /* HTML Content Reader Styling */
        #drawer-full-content h1, #drawer-full-content h2, #drawer-full-content h3 {
            color: #fff;
            font-weight: 600;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            line-height: 1.3;
        }
        #drawer-full-content h2 { font-size: 1.25rem; }
        #drawer-full-content h3 { font-size: 1.1rem; }
        #drawer-full-content p {
            margin-bottom: 1.25em;
            color: #b0b0b5;
        }
        #drawer-full-content a {
            color: #5e6ad2;
            text-decoration: underline;
        }
        #drawer-full-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1.5em 0;
        }
        #drawer-full-content ul, #drawer-full-content ol {
            margin-bottom: 1.25em;
            padding-left: 1.5em;
            color: #b0b0b5;
        }
        #drawer-full-content li { margin-bottom: 0.5em; }
        #drawer-full-content blockquote {
            border-left: 4px solid #5e6ad2;
            padding-left: 1em;
            color: #8a8a8e;
            font-style: italic;
            margin: 1.5em 0;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header: Minimalist -->
    <header class="border-b border-border-color bg-bg-primary sticky top-0 z-50 backdrop-blur-md bg-opacity-90">
        <div class="max-w-7xl mx-auto px-6 h-14 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                <a href="index.html" class="hover:text-accent transition-colors">
                    <h1 class="text-sm font-semibold tracking-tight">Signal.MD</h1>
                </a>
                <span class="text-[10px] text-text-secondary/60 font-mono hidden sm:inline-block ml-2 italic">Signal, Not Noise.</span>
            </div>
            
            <div class="flex items-center gap-6 text-sm font-medium text-text-secondary">
                <nav class="hidden md:flex items-center gap-6 mr-6 border-r border-border-color pr-6">
                    <a href="#" class="text-white hover:text-accent transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-bolt"></i> AI 实时情报
                    </a>
                    <a href="playground.html" class="hover:text-white transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-gamepad"></i> AI 游乐场
                    </a>
                </nav>
                <div class="flex items-center gap-2 sm:gap-4 text-xs font-mono text-text-secondary/80">
                    <div class="flex items-center gap-2 px-2 py-0.5 sm:px-3 sm:py-1 bg-bg-secondary/50 rounded-full border border-border-color/50 backdrop-blur-sm">
                        <span class="w-1.5 h-1.5 rounded-full bg-accent"></span>
                        <span id="stat-total" class="font-medium text-text-primary text-[10px] sm:text-xs">--</span>
                        <span class="text-border-color mx-0.5 sm:mx-1">/</span>
                        <span id="stat-new" class="text-emerald-400 font-medium text-[10px] sm:text-xs">+-- Today</span>
                    </div>
                    <span id="last-updated" class="opacity-60 hidden md:inline-block">WAITING...</span>
                    <a href="https://github.com/Whisoud/Signal.MD" target="_blank" class="hover:text-white transition-colors ml-1 sm:ml-2"><i class="fa-brands fa-github text-lg"></i></a>
                </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-6 max-w-5xl">
        <!-- Dashboard Grid -->
        <div class="grid grid-cols-1 gap-6">
            
            <!-- Left: Signal Feed -->
            <div class="bg-bg-card rounded-xl border border-border-color p-5 shadow-2xl h-[800px] flex flex-col relative overflow-hidden group">
                <!-- Header -->
                <div class="flex justify-between items-center mb-4 z-10">
                    <h2 class="text-lg font-bold flex items-center gap-2 text-text-primary tracking-wide">
                        <i class="fas fa-satellite-dish text-accent-primary animate-pulse-slow"></i> 
                        MEDAI SIGNAL FEED
                    </h2>
                
                <!-- Filter Tabs -->
                        <div class="flex bg-bg-secondary rounded-lg p-1 gap-1" id="feed-filters">
                            <button class="filter-btn active px-3 py-1 rounded text-[11px] font-mono text-text-secondary hover:text-white transition-colors" data-filter="all">All</button>
                            <button class="filter-btn px-3 py-1 rounded text-[11px] font-mono text-text-secondary hover:text-white transition-colors" data-filter="Insights">💡 Insights</button>
                            <button class="filter-btn px-3 py-1 rounded text-[11px] font-mono text-text-secondary hover:text-white transition-colors" data-filter="Product">🚀 Product</button>
                            <button class="filter-btn px-3 py-1 rounded text-[11px] font-mono text-text-secondary hover:text-white transition-colors" data-filter="Clinical">🏥 Clinical</button>
                            <button class="filter-btn px-3 py-1 rounded text-[11px] font-mono text-text-secondary hover:text-white transition-colors" data-filter="Market">💰 Market</button>
                        </div>
            </div>

            <!-- Feed Container -->
            <div id="signal-container" class="space-y-4 overflow-y-auto pr-2 custom-scrollbar flex-1 relative z-10">
                <!-- Loading State -->
                <div class="animate-pulse space-y-4">
                    <div class="h-24 bg-bg-secondary rounded-lg w-full"></div>
                    <div class="h-24 bg-bg-secondary rounded-lg w-full"></div>
                    <div class="h-24 bg-bg-secondary rounded-lg w-full"></div>
                </div>
            </div>

            <!-- Background Effects -->
            <div class="absolute inset-0 bg-gradient-to-br from-transparent via-bg-secondary/5 to-accent/5 pointer-events-none"></div>
        </div>
    </div>
    <!-- Drawer Component (Hidden by default) -->
    <div id="article-drawer" class="fixed inset-y-0 right-0 w-full md:w-1/2 bg-bg-primary border-l border-border-color shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-50 flex flex-col">
        <!-- Drawer Header -->
        <div class="flex items-center justify-between p-4 border-b border-border-color bg-bg-card">
            <div class="flex items-center gap-3">
                <span id="drawer-category" class="text-[10px] font-semibold tracking-wider px-2 py-1 rounded border uppercase flex items-center gap-1.5 text-slate-400 bg-slate-400/10 border-slate-400/20">
                    <span class="w-1.5 h-1.5 rounded-full bg-current opacity-80"></span>Category
                </span>
                <span id="drawer-source" class="text-xs text-text-muted"><i class="fas fa-globe mr-1"></i>Source</span>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleTranslation()" id="translate-btn" class="text-xs font-mono px-3 py-1.5 rounded-md border border-border-color text-text-secondary hover:text-white hover:border-accent transition-all flex items-center gap-2">
                    <i class="fa-solid fa-language"></i> <span>中英互译</span>
                </button>
                <button onclick="closeDrawer()" class="text-text-secondary hover:text-white transition-colors p-2">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
        </div>
        
        <!-- Drawer Content (Scrollable) -->
        <div class="flex-1 overflow-y-auto p-6 custom-scrollbar bg-bg-primary">
            <h1 id="drawer-title" class="text-2xl font-bold text-text-primary mb-4 leading-tight">Article Title</h1>
            
            <div class="flex items-center gap-4 text-xs text-text-muted mb-8 pb-4 border-b border-border-color/50">
                <span id="drawer-time"><i class="far fa-clock mr-1"></i>Time</span>
                <div id="drawer-tags" class="flex gap-2 flex-wrap">
                    <!-- Tags will be injected here -->
                </div>
            </div>
            
            <div id="drawer-full-content" class="prose prose-invert prose-sm md:prose-base max-w-none text-text-secondary leading-relaxed mb-8">
                <!-- Full HTML content will be injected here -->
            </div>
            
            <!-- Fallback/Iframe Area -->
            <div class="text-center py-8 border-t border-border-color/50">
                <a id="drawer-link" href="#" target="_blank" class="inline-block bg-accent hover:bg-[#4a55b3] text-white font-bold py-3 px-8 rounded-full transition-all transform hover:scale-105 shadow-[0_0_15px_rgba(94,106,210,0.3)]">
                    Read Full Article <i class="fas fa-external-link-alt ml-2"></i>
                </a>
                <p class="text-xs text-text-muted mt-4">Opens in a new tab</p>
            </div>
        </div>
    </div>
    
    <!-- Drawer Overlay Backdrop -->
    <div id="drawer-backdrop" onclick="closeDrawer()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300"></div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-bg-secondary border border-border-color text-white px-4 py-2 rounded-full shadow-lg transition-all duration-300 translate-y-10 opacity-0 z-[60] flex items-center gap-2 text-sm font-mono">
        <i class="fas fa-info-circle text-accent"></i>
        <span id="toast-msg"></span>
    </div>

    <script>
        // Data State
        let allData = [];
        let currentFilter = 'all';
        
        // Unread State Management: Store read article URLs
        let readArticles = JSON.parse(localStorage.getItem('aihot_read_articles') || 'null');
        
        // Fetch Data
        async function fetchData() {
            try {
                // Determine the correct base path for GitHub Pages
                const basePath = window.location.pathname.includes('/Signal.MD') ? '/Signal.MD' : '';
                const response = await fetch(`${basePath}/data/news.json?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error('Network response was not ok');
                allData = await response.json();
                
                console.log("Loaded data:", allData.length, "items");
                
                // Sort by time (newest first)
                allData.sort((a, b) => new Date(b.time) - new Date(a.time));

                // Initialize readArticles on very first visit to avoid everything being unread
                if (readArticles === null) {
                    readArticles = allData.map(item => item.url);
                    localStorage.setItem('aihot_read_articles', JSON.stringify(readArticles));
                }

                // --- Update Header Stats ---
                // 1. Total Signals
                document.getElementById('stat-total').innerText = `${allData.length} Signals`;
                
                // 2. Today's New Count (Local Time)
                const now = new Date();
                const todayCount = allData.filter(item => {
                    const itemDate = new Date(item.time);
                    return itemDate.toDateString() === now.toDateString();
                }).length;
                
                const statNewEl = document.getElementById('stat-new');
                statNewEl.innerText = `+${todayCount} Today`;
                
                // Highlight if there are new items
                if (todayCount > 0) {
                    statNewEl.classList.remove('text-text-secondary');
                    statNewEl.classList.add('text-emerald-400');
                } else {
                    statNewEl.classList.remove('text-emerald-400');
                    statNewEl.classList.add('text-text-secondary');
                }
                
                // 3. Last Updated Time (From Data)
                if (allData.length > 0) {
                    const lastUpdateDate = new Date(allData[0].time);
                    const timeString = lastUpdateDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    document.getElementById('last-updated').innerText = 'UPDATED ' + timeString;
                }
                
                render();
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('signal-container').innerHTML = `
                    <div class="p-4 text-center text-text-secondary text-sm border border-dashed border-border-color rounded-lg">
                        <i class="fa-solid fa-triangle-exclamation mb-2 text-accent"></i><br>
                        Data feed unavailable. Please run python scraper.py
                    </div>
                `;
            }
        }

        // Render Signal Feed
        function render() {
            const container = document.getElementById('signal-container');
            
            // Filter
            let filtered = allData;
            if (currentFilter !== 'all') {
                if (currentFilter === 'Market') {
                    // Include 'General' in Market tab for now
                    filtered = allData.filter(item => item.category === 'Market' || item.category === 'General');
                } else {
                    filtered = allData.filter(item => item.category === currentFilter);
                }
            }
            
            // Sort by time (newest first)
            filtered.sort((a, b) => new Date(b.time) - new Date(a.time));

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center text-text-secondary py-10 text-xs font-mono">NO SIGNALS FOUND (Filter: ${currentFilter})</div>`;
                return;
            }

            container.innerHTML = filtered.map((item, index) => {
                const color = getCategoryColor(item.category);
                const timeStr = formatTime(item.time);
                
                // Determine if article is new (unread)
                let isNew = !readArticles.includes(item.url);
                
                // Render Tags
                let tagsHtml = '';
                if (item.tags && item.tags.length > 0) {
                    tagsHtml = item.tags.map(tag => 
                        `<span class="px-2 py-0.5 rounded text-[9px] font-mono border border-border-color/50 text-text-muted hover:text-accent-primary transition-colors cursor-default">#${tag}</span>`
                    ).join('');
                }

                return `
                <div class="group border-b border-border-color/30 last:border-0 py-5 cursor-pointer hover:bg-bg-secondary/20 transition-all rounded-lg px-2 -mx-2 relative" onclick="openDrawer(${index}, '${currentFilter}')">
                    ${isNew ? `<div id="dot-${index}" class="absolute top-6 left-[-6px] w-2 h-2 rounded-full bg-[#00ff9d] animate-pulse shadow-[0_0_8px_#00ff9d]"></div>` : ''}
                    <div class="flex justify-between items-start mb-2 gap-4">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="text-[10px] font-semibold tracking-wider px-2 py-0.5 rounded border ${color} uppercase flex items-center gap-1.5">
                                <span class="w-1.5 h-1.5 rounded-full bg-current opacity-80"></span>
                                ${item.category}
                            </span>
                            <span class="text-xs text-text-muted flex items-center gap-1">
                                ${item.source}
                            </span>
                        </div>
                        <span class="text-[10px] font-mono text-text-muted whitespace-nowrap group-hover:text-accent-primary transition-colors">${timeStr}</span>
                    </div>
                    <h3 class="text-sm md:text-base font-bold text-text-primary group-hover:text-white transition-colors leading-snug mb-2 line-clamp-2">
                        ${item.title}
                    </h3>
                    <p class="text-xs text-text-secondary leading-relaxed line-clamp-2 mb-3">
                        ${item.summary}
                    </p>
                    <div class="flex flex-wrap gap-2">
                        ${tagsHtml}
                    </div>
                </div>
                `;
            }).join('');
        }

        // Variables to store original text for translation toggle
        let originalTitle = '';
        let originalContent = '';
        let currentItemLang = 'zh'; // Default
        
        // --- Drawer Logic ---
        function openDrawer(index, filterState) {
            // Re-apply filter to get the correct item from the rendered list
            let filtered = allData;
            if (filterState !== 'all') {
                if (filterState === 'Market') {
                    filtered = allData.filter(item => item.category === 'Market' || item.category === 'General');
                } else {
                    filtered = allData.filter(item => item.category === filterState);
                }
            }
            filtered.sort((a, b) => new Date(b.time) - new Date(a.time));
            
            const item = filtered[index];
            if (!item) return;
            
            // Mark as read
            if (!readArticles.includes(item.url)) {
                readArticles.push(item.url);
                localStorage.setItem('aihot_read_articles', JSON.stringify(readArticles));
                const dot = document.getElementById(`dot-${index}`);
                if (dot) dot.style.display = 'none';
            }
            
            // Reset Translation state
            isTranslated = false;
            const tBtn = document.getElementById('translate-btn');
            tBtn.querySelector('i').className = 'fa-solid fa-language';
            tBtn.classList.remove('text-accent', 'border-accent');

            // Populate Drawer Data
            originalTitle = item.title;
            currentItemLang = item.lang || 'zh';
            
            document.getElementById('drawer-category').textContent = item.category;
            document.getElementById('drawer-category').className = `text-[10px] font-semibold tracking-wider px-2 py-1 rounded border uppercase flex items-center gap-1.5 ${getCategoryColor(item.category)}`;
            document.getElementById('drawer-category').innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-current opacity-80"></span>${item.category}`;
            
            document.getElementById('drawer-source').innerHTML = `<i class="fas fa-globe mr-1"></i>${item.source}`;
            document.getElementById('drawer-title').textContent = item.title;
            
            // Format time for drawer to show only YYYY-MM-DD
            const drawerTime = item.time ? item.time.split(' ')[0] : '';
            document.getElementById('drawer-time').innerHTML = `<i class="far fa-clock mr-1"></i>${drawerTime}`;
            
            // Inject Full Content if available, else fallback to summary
            const contentContainer = document.getElementById('drawer-full-content');
            if (item.full_content && item.full_content.trim() !== '') {
                // If the full_content is just plain text (doesn't start with <), wrap it in paragraphs
                let content = item.full_content;
                if (!content.trim().startsWith('<')) {
                    content = content.split('\n').map(p => `<p>${p}</p>`).join('');
                }
                originalContent = content;
                contentContainer.innerHTML = content;
            } else {
                originalContent = `<p class="italic text-text-muted">${item.summary}</p>`;
                contentContainer.innerHTML = originalContent;
            }
            
            document.getElementById('drawer-link').href = item.url;

            // Render Tags in Drawer
            const tagsContainer = document.getElementById('drawer-tags');
            if (item.tags && item.tags.length > 0) {
                tagsContainer.innerHTML = item.tags.map(tag => 
                    `<span class="px-2 py-1 rounded-md text-[10px] font-mono bg-bg-secondary text-text-secondary border border-border-color">#${tag}</span>`
                ).join('');
            } else {
                tagsContainer.innerHTML = '';
            }

            // Show Drawer
            const drawer = document.getElementById('article-drawer');
            const backdrop = document.getElementById('drawer-backdrop');
            
            // Scroll drawer content to top
            const drawerScrollContainer = drawer.querySelector('.overflow-y-auto');
            if (drawerScrollContainer) {
                drawerScrollContainer.scrollTop = 0;
            }
            
            drawer.classList.remove('translate-x-full');
            backdrop.classList.remove('hidden');
            // Small delay for transition
            setTimeout(() => {
                backdrop.classList.remove('opacity-0');
            }, 10);
            
            // Prevent body scroll
            document.body.style.overflow = 'hidden';
        }

        function closeDrawer() {
            const drawer = document.getElementById('article-drawer');
            const backdrop = document.getElementById('drawer-backdrop');
            
            drawer.classList.add('translate-x-full');
            backdrop.classList.add('opacity-0');
            
            setTimeout(() => {
                backdrop.classList.add('hidden');
                document.body.style.overflow = ''; // Restore scroll
            }, 300);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('translate-y-10', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
            }, 3000);
        }

        let isTranslated = false;
        async function toggleTranslation() {
            const btn = document.getElementById('translate-btn');
            const icon = btn.querySelector('i');
            const titleEl = document.getElementById('drawer-title');
            const contentEl = document.getElementById('drawer-full-content');
            
            if (!isTranslated) {
                // Determine target language based on current item lang
                // If it's English, translate to Chinese. If Chinese, translate to English.
                const sourceLang = currentItemLang === 'en' ? 'en' : 'zh';
                const targetLang = currentItemLang === 'en' ? 'zh' : 'en';
                
                // Show Loading
                icon.className = 'fas fa-spinner fa-spin';
                btn.classList.add('text-accent', 'border-accent');
                btn.querySelector('span').innerText = 'Translating...';
                
                try {
                    // We will translate title and the text content of the HTML separately
                    // Note: This uses a free, public CORS-enabled API from lingva.ml (a Google Translate frontend)
                    // It's rate-limited but perfect for a zero-cost frontend MVP
                    
                    const translateText = async (text) => {
                        // Lingva API endpoint
                        const url = `https://lingva.ml/api/v1/${sourceLang}/${targetLang}/${encodeURIComponent(text)}`;
                        const res = await fetch(url);
                        if (!res.ok) throw new Error('Translation API failed');
                        const data = await res.json();
                        return data.translation;
                    };

                    // 1. Translate Title
                    const translatedTitle = await translateText(originalTitle);
                    titleEl.innerText = translatedTitle;

                    // 2. Translate Content (Strip HTML for simplicity, or just translate text nodes)
                    // For a robust zero-cost MVP, we translate the text but keep basic structure
                    // Extracting text from paragraphs
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = originalContent;
                    
                    // We only translate <p> tags to avoid breaking complex HTML
                    const pTags = tempDiv.querySelectorAll('p');
                    
                    // To avoid hitting rate limits with too many requests, we batch them or do sequentially with delay
                    // For MVP, let's translate paragraph by paragraph sequentially
                    for (let i = 0; i < pTags.length; i++) {
                        const p = pTags[i];
                        if (p.innerText.trim().length > 0) {
                            // Quick delay to respect public API limits
                            await new Promise(r => setTimeout(r, 200)); 
                            p.innerText = await translateText(p.innerText);
                        }
                    }
                    
                    contentEl.innerHTML = tempDiv.innerHTML;
                    
                    // Success state
                    isTranslated = true;
                    icon.className = 'fa-solid fa-language';
                    btn.querySelector('span').innerText = targetLang === 'zh' ? 'Show Original' : '显示原文';
                    showToast("Translation completed!");
                    
                } catch (error) {
                    console.error("Translation error:", error);
                    icon.className = 'fa-solid fa-language';
                    btn.classList.remove('text-accent', 'border-accent');
                    btn.querySelector('span').innerText = '中英互译';
                    showToast("Translation failed. Free API might be rate-limited.");
                }
            } else {
                // Revert to original
                titleEl.innerText = originalTitle;
                contentEl.innerHTML = originalContent;
                
                isTranslated = false;
                icon.className = 'fa-solid fa-language';
                btn.classList.remove('text-accent', 'border-accent');
                btn.querySelector('span').innerText = '中英互译';
            }
        }

        // Helpers
        function getCategoryColor(cat) {
            const map = {
                'Insights': 'text-amber-400 bg-amber-400/10 border-amber-400/20',
                'Product': 'text-purple-400 bg-purple-400/10 border-purple-400/20',
                'Clinical': 'text-emerald-400 bg-emerald-400/10 border-emerald-400/20',
                'Market': 'text-orange-400 bg-orange-400/10 border-orange-400/20',
                'General': 'text-slate-400 bg-slate-400/10 border-slate-400/20'
            };
            return map[cat] || map['General'];
        }

        function formatTime(timeStr) {
            // Display friendly relative time
            if (!timeStr) return '';
            
            try {
                // Parse "YYYY-MM-DD" or "YYYY-MM-DD HH:MM"
                const datePart = timeStr.split(' ')[0];
                const date = new Date(datePart);
                const now = new Date();
                const diffMs = now - date;
                const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                
                if (diffDays === 0) {
                    return 'Today';
                } else if (diffDays === 1) {
                    return 'Yesterday';
                } else if (diffDays < 7) {
                    return diffDays + ' days ago';
                } else {
                    return datePart; // "2026-01-19"
                }
            } catch (e) {
                return timeStr;
            }
        }

        // Event Listeners
        document.getElementById('feed-filters').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                // UI
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'text-white', 'bg-bg-primary'));
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.add('text-text-secondary'));
                
                e.target.classList.add('active', 'text-white');
                e.target.classList.remove('text-text-secondary');
                
                // Logic
                currentFilter = e.target.dataset.filter; // 'all', 'Tech', 'Biz', ...
                render();
                
                // Scroll back to top smoothly for the signal container
                const signalContainer = document.getElementById('signal-container');
                if (signalContainer) {
                    signalContainer.scrollTo({
                        top: 0,
                        left: 0,
                        behavior: 'smooth'
                    });
                }
            }
        });

        // Init
        fetchData();
        
        // Auto refresh every 5 min
        setInterval(fetchData, 300000);

    </script>
</body>
</html>
