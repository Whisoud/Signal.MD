<!DOCTYPE html>
<html lang="zh-CN" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal.MD | Signal, Not Noise.</title>
    <link rel="stylesheet" href="static/css/tailwind.css">
    <!-- Load FontAwesome via official CDN to fix missing local fonts issue -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body { background-color: #0f0f10; color: #e1e1e3; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2e2e32; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3e3e42; }

        .card-hover:hover {
            background-color: #1a1a1c;
            border-color: #3e3e42;
        }

        /* HTML Content Reader Styling */
        #drawer-full-content h1, #drawer-full-content h2, #drawer-full-content h3 {
            color: #fff;
            font-weight: 600;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            line-height: 1.3;
        }
        #drawer-full-content h2 { font-size: 1.25rem; }
        #drawer-full-content h3 { font-size: 1.1rem; }
        #drawer-full-content p {
            margin-bottom: 1.25em;
            color: #b0b0b5;
        }
        #drawer-full-content a {
            color: #5e6ad2;
            text-decoration: underline;
        }
        #drawer-full-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1.5em 0;
        }
        #drawer-full-content ul, #drawer-full-content ol {
            margin-bottom: 1.25em;
            padding-left: 1.5em;
            color: #b0b0b5;
        }
        #drawer-full-content li { margin-bottom: 0.5em; }
        #drawer-full-content blockquote {
            border-left: 4px solid #5e6ad2;
            padding-left: 1em;
            color: #8a8a8e;
            font-style: italic;
            margin: 1.5em 0;
        }
        
        /* Force dark mode compatibility on scraped HTML */
        #drawer-full-content * {
            background-color: transparent !important;
            border-color: #2e2e32 !important;
        }
        #drawer-full-content table {
            width: 100% !important;
            border-collapse: collapse;
            margin: 1.5em 0;
        }
        #drawer-full-content th, #drawer-full-content td {
            border: 1px solid #2e2e32 !important;
            padding: 8px;
            color: #b0b0b5 !important;
        }
        #drawer-full-content span, #drawer-full-content div, #drawer-full-content font {
            color: inherit !important;
        }

        .utility-cluster {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .utility-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 34px;
            padding: 0 12px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.02) 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .utility-chip__dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: #818cf8;
            box-shadow: 0 0 14px rgba(94, 106, 210, 0.5);
            flex-shrink: 0;
        }

        .utility-chip__separator {
            color: rgba(138, 138, 142, 0.45);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }

        .utility-stat {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.01em;
            line-height: 1;
            white-space: nowrap;
        }

        .utility-stat--primary {
            color: #f3f4f6;
        }

        .utility-stat--positive {
            color: #34d399;
        }

        .utility-updated {
            display: inline-flex;
            align-items: center;
            min-height: 34px;
            padding: 0 12px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            color: #7c7d84;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .auth-login-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 34px;
            padding: 0 12px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.02);
            color: #c9c9cf;
            font-size: 12px;
            font-weight: 500;
            transition: border-color 180ms ease, background 180ms ease, color 180ms ease, transform 180ms ease;
        }

        .auth-login-button:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(94, 106, 210, 0.24);
            transform: translateY(-1px);
        }

        .auth-login-button.hidden {
            display: none !important;
        }

        .filter-tabs {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.015) 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .filter-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 32px;
            padding: 0 12px;
            border-radius: 12px;
            border: 1px solid transparent;
            color: #8a8a8e;
            background: transparent;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.01em;
            transition: background 180ms ease, color 180ms ease, border-color 180ms ease, transform 180ms ease;
        }

        .filter-btn:hover {
            color: #f3f4f6;
            background: rgba(255, 255, 255, 0.035);
        }

        .filter-btn.active {
            transform: translateY(-1px);
        }

        .filter-btn:not(.active) i {
            opacity: 0.88;
            color: inherit;
        }

        .filter-btn:not(.active) i.text-amber-400 { color: #fbbf24 !important; }
        .filter-btn:not(.active) i.text-rose-400 { color: #fb7185 !important; }
        .filter-btn:not(.active) i.text-emerald-400 { color: #34d399 !important; }
        .filter-btn:not(.active) i.text-yellow-400 { color: #facc15 !important; }
        .filter-btn:not(.active) i.text-blue-400 { color: #60a5fa !important; }

        .filter-btn.active[data-filter="all"],
        .filter-btn.active[data-filter="saved"] {
            background: rgba(94, 106, 210, 0.14);
            color: #c7d2fe;
            border-color: rgba(94, 106, 210, 0.22);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03), 0 0 0 1px rgba(94, 106, 210, 0.05);
        }

        .filter-btn.active[data-filter="Insights"] {
            background: rgba(251, 191, 36, 0.12);
            color: #fcd34d;
            border-color: rgba(251, 191, 36, 0.22);
        }

        .filter-btn.active[data-filter="Product"] {
            background: rgba(251, 113, 133, 0.12);
            color: #fda4af;
            border-color: rgba(251, 113, 133, 0.22);
        }

        .filter-btn.active[data-filter="Clinical"] {
            background: rgba(52, 211, 153, 0.12);
            color: #6ee7b7;
            border-color: rgba(52, 211, 153, 0.22);
        }

        .filter-btn.active[data-filter="Market"] {
            background: rgba(250, 204, 21, 0.12);
            color: #fde047;
            border-color: rgba(250, 204, 21, 0.22);
        }

        .filter-btn.active[data-filter="Policy"] {
            background: rgba(96, 165, 250, 0.12);
            color: #93c5fd;
            border-color: rgba(96, 165, 250, 0.22);
        }

        body.modal-open {
            overflow: hidden;
        }

        .login-modal {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: grid;
            place-items: center;
            padding: 24px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 220ms ease, visibility 220ms ease;
        }

        .login-modal.is-open {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .login-modal__backdrop {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at top, rgba(94, 106, 210, 0.18), transparent 36%),
                rgba(6, 6, 8, 0.76);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .login-modal__shell {
            position: relative;
            width: min(100%, 420px);
            z-index: 1;
            transform: translateY(18px) scale(0.96);
            transition: transform 220ms ease;
        }

        .login-modal.is-open .login-modal__shell {
            transform: translateY(0) scale(1);
        }

        .login-modal__card {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background:
                linear-gradient(180deg, rgba(30, 31, 36, 0.96) 0%, rgba(18, 18, 22, 0.98) 100%);
            box-shadow:
                0 24px 70px rgba(0, 0, 0, 0.55),
                0 0 0 1px rgba(94, 106, 210, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
            padding: 32px 28px 24px;
        }

        .login-modal__card::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at top right, rgba(94, 106, 210, 0.18), transparent 32%),
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.04), transparent 24%);
            pointer-events: none;
        }

        .login-modal__accent {
            position: absolute;
            top: 0;
            left: 24px;
            right: 24px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(94, 106, 210, 0.85), transparent);
            opacity: 0.9;
        }

        .login-modal__close {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 32px;
            height: 32px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.02);
            color: #8a8a8e;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 180ms ease;
        }

        .login-modal__close:hover {
            color: #fff;
            border-color: rgba(94, 106, 210, 0.35);
            background: rgba(94, 106, 210, 0.12);
        }

        .login-modal__eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid rgba(94, 106, 210, 0.22);
            background: rgba(94, 106, 210, 0.1);
            color: #a5b4fc;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .login-modal__eyebrow-dot {
            width: 6px;
            height: 6px;
            border-radius: 999px;
            background: #5e6ad2;
            box-shadow: 0 0 10px rgba(94, 106, 210, 0.65);
        }

        .login-modal__icon {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            margin: 20px auto 16px;
            display: grid;
            place-items: center;
            color: #c7d2fe;
            background: linear-gradient(180deg, rgba(94, 106, 210, 0.2), rgba(94, 106, 210, 0.08));
            border: 1px solid rgba(94, 106, 210, 0.24);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .login-modal__title {
            color: #f5f5f6;
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            line-height: 1.1;
            text-align: center;
            margin: 0;
        }

        .login-modal__description {
            color: #8a8a8e;
            font-size: 0.92rem;
            line-height: 1.6;
            text-align: center;
            margin: 10px 0 24px;
        }

        .login-modal__github {
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: linear-gradient(180deg, #24292e 0%, #191d21 100%);
            color: #f5f5f6;
            font-weight: 600;
            padding: 14px 18px;
            transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.28);
        }

        .login-modal__github:hover {
            transform: translateY(-1px);
            border-color: rgba(94, 106, 210, 0.3);
            box-shadow: 0 16px 30px rgba(0, 0, 0, 0.34);
            background: linear-gradient(180deg, #2a3036 0%, #1c2025 100%);
        }

        .login-modal__meta {
            margin-top: 14px;
            text-align: center;
            color: #6b7280;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.02em;
        }

        .user-menu-trigger {
            display: inline-flex;
            align-items: center;
            gap: 0;
            padding: 4px;
            border-radius: 999px;
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.02);
            transition: background 180ms ease, border-color 180ms ease, color 180ms ease;
        }

        .user-menu-trigger:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(94, 106, 210, 0.2);
        }

        .user-menu-name {
            font-size: 12px;
            font-weight: 500;
            color: #d4d4d8;
            letter-spacing: 0.01em;
            line-height: 1;
            margin-left: 8px;
            margin-right: 2px;
        }

        .user-menu-dropdown {
            width: 210px;
            margin-top: 12px;
            padding: 8px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: linear-gradient(180deg, rgba(24, 24, 29, 0.98) 0%, rgba(16, 16, 20, 0.98) 100%);
            box-shadow:
                0 24px 60px rgba(0, 0, 0, 0.45),
                0 0 0 1px rgba(94, 106, 210, 0.06);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .user-menu-divider {
            height: 1px;
            margin: 8px 4px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
        }

        .user-menu-item {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 12px;
            padding: 10px 12px;
            color: #d4d4d8;
            font-size: 13px;
            font-weight: 500;
            line-height: 1;
            transition: background 180ms ease, color 180ms ease, transform 180ms ease;
        }

        .user-menu-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            transform: translateX(1px);
        }

        .user-menu-item--danger {
            color: #9ca3af;
        }

        .user-menu-item--danger:hover {
            background: rgba(244, 63, 94, 0.1);
            color: #fb7185;
        }

        .user-menu-item-icon {
            width: 28px;
            height: 28px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.03);
        }

        .user-menu-item-icon--accent {
            color: #818cf8;
            background: rgba(94, 106, 210, 0.14);
            border-color: rgba(94, 106, 210, 0.18);
        }

        .drawer-bookmark-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-width: 40px;
            height: 40px;
            padding: 0 12px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: #8a8a8e;
            transition: background 180ms ease, border-color 180ms ease, color 180ms ease, transform 180ms ease;
        }

        .drawer-bookmark-button:hover {
            color: #ffffff;
            border-color: rgba(94, 106, 210, 0.22);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-1px);
        }

        .drawer-bookmark-button.is-saved {
            color: #818cf8;
            border-color: rgba(94, 106, 210, 0.24);
            background: rgba(94, 106, 210, 0.12);
        }

        .drawer-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: linear-gradient(180deg, rgba(19, 19, 24, 0.98) 0%, rgba(15, 15, 18, 0.95) 100%);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .drawer-toolbar-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .drawer-source-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 28px;
            padding: 0 10px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.025);
            color: #8a8a8e;
            font-size: 11px;
            font-weight: 500;
            line-height: 1;
            white-space: nowrap;
        }

        .drawer-toolbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .drawer-icon-button {
            width: 40px;
            height: 40px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            background: rgba(255, 255, 255, 0.02);
            color: #8a8a8e;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 180ms ease, border-color 180ms ease, color 180ms ease, transform 180ms ease;
        }

        .drawer-icon-button:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-1px);
        }

        .signal-card {
            transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
        }

        @media (max-width: 640px) {
            .utility-cluster {
                gap: 8px;
                width: 100%;
                justify-content: flex-end;
            }

            .utility-chip {
                min-height: 32px;
                padding: 0 10px;
                max-width: calc(100vw - 140px);
                overflow: hidden;
            }

            .utility-updated {
                display: none;
            }

            .utility-stat {
                font-size: 11px;
            }

            .user-menu-name {
                display: none;
            }

            .auth-login-button {
                min-width: 34px;
                width: 34px;
                padding: 0;
                justify-content: center;
            }

            .filter-tabs {
                width: 100%;
                overflow-x: auto;
                justify-content: flex-start;
                gap: 4px;
                padding: 5px;
                border-radius: 14px;
            }

            .filter-btn {
                min-height: 30px;
                padding: 0 10px;
                font-size: 10px;
            }

            .filter-tabs::after {
                content: "";
                position: sticky;
                right: -5px;
                width: 20px;
                flex: 0 0 20px;
                pointer-events: none;
                background: linear-gradient(90deg, rgba(15, 15, 16, 0), rgba(15, 15, 16, 0.95));
            }

            #search-input-mobile-inline {
                height: 40px;
                padding-left: 38px;
                padding-right: 14px;
                border-radius: 14px;
                border-color: rgba(255, 255, 255, 0.06);
                background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.02) 100%);
                box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
            }

            .login-modal {
                padding: 16px;
            }

            .login-modal__card {
                padding: 28px 20px 20px;
                border-radius: 20px;
            }

            .login-modal__title {
                font-size: 1.35rem;
            }

            .drawer-toolbar {
                padding: 12px 14px;
                align-items: flex-start;
            }

            .drawer-source-chip {
                max-width: 104px;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .drawer-toolbar-meta {
                gap: 8px;
                max-width: calc(100% - 96px);
            }

            .drawer-toolbar-actions {
                gap: 8px;
            }

            .drawer-bookmark-button,
            .drawer-icon-button {
                width: 38px;
                min-width: 38px;
                height: 38px;
                padding: 0;
            }

            #article-drawer {
                border-left: 0;
            }

            #drawer-title {
                font-size: 1.5rem;
                line-height: 1.2;
                letter-spacing: -0.03em;
            }

            #drawer-full-content {
                font-size: 0.96rem;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header: Minimalist -->
    <header class="border-b border-border-color bg-bg-primary sticky top-0 z-50 backdrop-blur-md bg-opacity-90">
        <div class="max-w-7xl mx-auto px-4 md:px-6 h-14 flex items-center justify-between">
            <div class="flex items-center gap-2 md:gap-3">
                <div class="w-1.5 h-1.5 md:w-2 md:h-2 rounded-full bg-green-500 animate-pulse"></div>
                <a href="index.html" class="hover:text-accent transition-colors">
                    <h1 class="text-sm md:text-base font-semibold tracking-tight">Signal.MD</h1>
                </a>
                <span class="text-[10px] text-text-secondary/60 font-mono hidden md:inline-block ml-2 italic">Signal, Not Noise.</span>
            </div>
            
            <div class="flex items-center gap-2 md:gap-5 text-sm font-medium text-text-secondary">
                <!-- Desktop Nav -->
                <nav class="hidden md:flex items-center gap-6">
                    <div class="relative">
                        <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-text-secondary/50 text-xs"></i>

    <script>
        // --- Supabase Configuration ---
        const SUPABASE_URL = 'https://odqpdvlspnscyughekyr.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_0pRwAZWLEqSCwcWj1H3-gQ_Td5m5EUe';
        const PROD_REDIRECT_URL = 'https://whisoud.github.io/Signal.MD/';
        const AUTH_LOGIN_PENDING_KEY = 'signalmd-auth-login-pending';
        const AUTH_LOGOUT_PENDING_KEY = 'signalmd-auth-logout-pending';
        const AUTH_RELOAD_DONE_KEY = 'signalmd-auth-reload-done';
        
        let supabaseClient = null;
        if (SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                auth: {
                    flowType: 'implicit',
                    detectSessionInUrl: true,
                    persistSession: true,
                    autoRefreshToken: true
                }
            });
        }

        function getAuthRedirectUrl() {
            if (window.location.hostname === 'whisoud.github.io') {
                return PROD_REDIRECT_URL;
            }
            return `${window.location.origin}${window.location.pathname}`;
        }

        function cleanupAuthRedirectUrl() {
            const hasHashToken = window.location.hash.includes('access_token') || window.location.hash.includes('refresh_token');
            const hasCode = new URLSearchParams(window.location.search).has('code');
            if (!hasHashToken && !hasCode) return;

            const cleanUrl = `${window.location.origin}${window.location.pathname}`;
            window.history.replaceState({}, document.title, cleanUrl);
        }

        function hasPendingAuthRedirect() {
            return (
                window.location.hash.includes('access_token') ||
                window.location.hash.includes('refresh_token') ||
                new URLSearchParams(window.location.search).has('code')
            );
        }

        function markAuthPending(type) {
            if (type === 'login') {
                localStorage.setItem(AUTH_LOGIN_PENDING_KEY, '1');
                localStorage.removeItem(AUTH_LOGOUT_PENDING_KEY);
            } else if (type === 'logout') {
                localStorage.setItem(AUTH_LOGOUT_PENDING_KEY, '1');
                localStorage.removeItem(AUTH_LOGIN_PENDING_KEY);
            }
            sessionStorage.removeItem(AUTH_RELOAD_DONE_KEY);
        }

        function clearAuthPending() {
            localStorage.removeItem(AUTH_LOGIN_PENDING_KEY);
            localStorage.removeItem(AUTH_LOGOUT_PENDING_KEY);
        }

        function shouldForceAuthReload() {
            return sessionStorage.getItem(AUTH_RELOAD_DONE_KEY) !== '1';
        }

        function markAuthReloadDone() {
            sessionStorage.setItem(AUTH_RELOAD_DONE_KEY, '1');
        }

        function reloadToCleanCurrentPage() {
            const cleanUrl = `${window.location.origin}${window.location.pathname}`;
            window.location.replace(cleanUrl);
        }

        async function waitForSessionReady(maxAttempts = 12, delayMs = 250) {
            for (let attempt = 0; attempt < maxAttempts; attempt++) {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session?.user) {
                    return session;
                }
                await new Promise((resolve) => setTimeout(resolve, delayMs));
            }
            return null;
        }

        // Data State
        let allData = [];
        let currentFilter = 'all';
        let searchQuery = '';
        let currentPage = 0;
        const PAGE_SIZE = 20;
        let hasMore = true;
        let isLoading = false;
        
        // Fetch Data from Supabase
        function buildSignalsQuery({ countOnly = false } = {}) {
            let query = supabaseClient
                .from('signals')
                .select(countOnly ? '*' : '*', countOnly ? { count: 'exact', head: true } : { count: 'exact' });

            if (searchQuery) {
                query = query.or(`title.ilike.%${searchQuery}%,summary.ilike.%${searchQuery}%`);
            }

            if (currentFilter !== 'all' && currentFilter !== 'saved') {
                if (currentFilter === 'Market') {
                    query = query.in('category', ['Market', 'General']);
                } else {
                    query = query.eq('category', currentFilter);
                }
            }

            return query;
        }

        function isItemFromToday(timeValue) {
            if (!timeValue) return false;

            try {
                let timeString = String(timeValue).replace(/-/g, '/');
                if (timeString.includes('+00:00')) {
                    timeString = timeString.replace('+00:00', 'Z').replace(/\//g, '-');
                }

                const date = new Date(timeString);
                if (Number.isNaN(date.getTime())) return false;

                const today = new Date();
                return (
                    date.getFullYear() === today.getFullYear() &&
                    date.getMonth() === today.getMonth() &&
                    date.getDate() === today.getDate()
                );
            } catch {
                return false;
            }
        }

        function updateHeaderStats(totalCount, todayCount, totalLabel = 'Signals') {
            const statTotalEl = document.getElementById('stat-total');
            const statNewEl = document.getElementById('stat-new');

            statTotalEl.innerText = `${totalCount || 0} ${totalLabel}`;
            statNewEl.innerText = `+${todayCount || 0} Today`;

            if ((todayCount || 0) > 0) {
                statNewEl.classList.remove('text-text-secondary');
                statNewEl.classList.add('text-emerald-400');
            } else {
                statNewEl.classList.remove('text-emerald-400');
                statNewEl.classList.add('text-text-secondary');
            }
        }

        async function fetchData(isAppend = false) {
            if (isLoading || (!hasMore && isAppend)) return;
            isLoading = true;
            
            const container = document.getElementById('signal-container');
            if (!isAppend) {
                // Show loading state for initial load
                container.innerHTML = `
                    <div class="animate-pulse space-y-4">
                        <div class="h-24 bg-bg-secondary rounded-lg w-full"></div>
                        <div class="h-24 bg-bg-secondary rounded-lg w-full"></div>
                        <div class="h-24 bg-bg-secondary rounded-lg w-full"></div>
                    </div>
                `;
            }

            try {
                if (!supabaseClient) {
                    throw new Error("Supabase is not configured. Using fallback local JSON mode.");
                }

                let query = buildSignalsQuery();

                // Handle Saved filter separately
                if (currentFilter === 'saved') {
                    const result = await fetchSavedSignals();
                    if (result.error) {
                        container.innerHTML = `<div class="p-4 text-center text-text-secondary text-sm">加载收藏失败</div>`;
                        hasMore = false;
                        return;
                    }
                    allData = result.data;
                    hasMore = false;
                    updateHeaderStats(allData.length, allData.filter(item => isItemFromToday(item.time)).length, 'Saved');
                    render(allData, false);
                    isLoading = false;
                    return;
                }

                // Pagination & Sorting
                const start = currentPage * PAGE_SIZE;
                const end = start + PAGE_SIZE - 1;
                
                const { data, error, count } = await query
                    .order('time', { ascending: false }) // Ensures absolute newest comes first
                    .order('id', { ascending: false }) // CRITICAL: Secondary sort for stable pagination, also descending so newer scraped items of the same time appear first
                    .range(start, end);

                if (error) throw error;

                // Update state with deduplication
                let newItems = data;
                if (isAppend) {
                    // Deduplicate by url before appending to avoid any overlapping items
                    const existingUrls = new Set(allData.map(item => item.url));
                    newItems = data.filter(item => !existingUrls.has(item.url));
                    allData = [...allData, ...newItems];
                } else {
                    allData = data;
                }
                
                hasMore = data.length === PAGE_SIZE;

                // --- Update Header Stats ---
                if (!isAppend) {
                    const now = new Date();
                    const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
                    
                    const { count: todayTotalCount } = await buildSignalsQuery({ countOnly: true })
                        .gte('time', startOfToday);

                    updateHeaderStats(count || 0, todayTotalCount || 0, 'Signals');
                    
                    if (allData.length > 0) {
                        const lastUpdateDate = new Date(allData[0].time);
                        const timeString = lastUpdateDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        document.getElementById('last-updated').innerText = 'UPDATED ' + timeString;
                    }
                }
                
                render(isAppend ? newItems : allData, isAppend);
            } catch (error) {
                console.warn('Supabase fetch failed, falling back to local JSON:', error);
                await fetchLocalFallback();
            } finally {
                isLoading = false;
            }
        }

        async function fetchLocalFallback() {
            try {
                const basePath = window.location.pathname.includes('/Signal.MD') ? '/Signal.MD' : '';
                const response = await fetch(`${basePath}/data/news.json?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error('Network response was not ok');
                allData = await response.json();
                
                // Local filter/search logic
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    allData = allData.filter(item => 
                        (item.title && item.title.toLowerCase().includes(q)) || 
                        (item.summary && item.summary.toLowerCase().includes(q))
                    );
                }
                
                if (currentFilter !== 'all' && currentFilter !== 'saved') {
                    if (currentFilter === 'Market') {
                        allData = allData.filter(item => item.category === 'Market' || item.category === 'General');
                    } else {
                        allData = allData.filter(item => item.category === currentFilter);
                    }
                }
                
                allData.sort((a, b) => new Date(b.time) - new Date(a.time));
                hasMore = false; // No pagination in fallback
                
                updateHeaderStats(allData.length, allData.filter(item => isItemFromToday(item.time)).length, 'Signals');
                render(allData, false);
            } catch (e) {
                document.getElementById('signal-container').innerHTML = `
                    <div class="p-4 text-center text-text-secondary text-sm border border-dashed border-border-color rounded-lg">
                        <i class="fa-solid fa-triangle-exclamation mb-2 text-accent"></i><br>
                        Data feed unavailable.
                    </div>
                `;
            }
        }

        // Render Signal Feed
        function render(itemsToRender, isAppend = false) {
            const container = document.getElementById('signal-container');
            
            if (!isAppend && itemsToRender.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 px-4 text-center">
                        <div class="w-16 h-16 rounded-full bg-bg-secondary/50 flex items-center justify-center mb-4 border border-border-color/30">
                            <i class="fa-solid fa-satellite-dish text-text-secondary text-xl"></i>
                        </div>
                        <h3 class="text-text-primary font-medium mb-2">NO SIGNALS FOUND</h3>
                        <p class="text-text-secondary text-xs max-w-xs mb-6">
                            未找到与当前检索或过滤条件匹配的情报。<br>
                            建议尝试使用更广泛的关键词，如：
                        </p>
                        <div class="flex flex-wrap gap-2 justify-center">
                            <button onclick="const q='AI医疗'; document.getElementById('search-input').value=q; const ms=document.getElementById('search-input-mobile'); if(ms)ms.value=q; document.getElementById('search-input').dispatchEvent(new Event('input'))" class="px-3 py-1 rounded-full border border-border-color text-xs text-text-muted hover:text-accent-primary hover:border-accent-primary transition-colors">AI医疗</button>
                            <button onclick="const q='辅助诊疗'; document.getElementById('search-input').value=q; const ms=document.getElementById('search-input-mobile'); if(ms)ms.value=q; document.getElementById('search-input').dispatchEvent(new Event('input'))" class="px-3 py-1 rounded-full border border-border-color text-xs text-text-muted hover:text-accent-primary hover:border-accent-primary transition-colors">辅助诊疗</button>
                            <button onclick="const q='医疗融资'; document.getElementById('search-input').value=q; const ms=document.getElementById('search-input-mobile'); if(ms)ms.value=q; document.getElementById('search-input').dispatchEvent(new Event('input'))" class="px-3 py-1 rounded-full border border-border-color text-xs text-text-muted hover:text-accent-primary hover:border-accent-primary transition-colors">医疗融资</button>
                        </div>
                    </div>
                `;
                return;
            }

            const html = itemsToRender.map((item) => {
                const color = getCategoryColor(item.category);
                const timeStr = formatTime(item.time);
                
                // 判断是否为最近 24 小时内的新增内容 (对齐右上角 +x Today 逻辑)
                let isNew = false;
                if (item.time) {
                    try {
                        // Handle ISO string from Supabase (e.g., "2026-03-16T01:32:00+00:00")
                        let timeString = item.time.replace(/-/g, '/');
                        // Fix Supabase format for Safari/iOS
                        if (timeString.includes('+00:00')) {
                            timeString = timeString.replace('+00:00', 'Z').replace(/\//g, '-');
                        }
                        const date = new Date(timeString);
                        const now = new Date();
                        
                        const year = date.getFullYear();
                        const month = date.getMonth();
                        const day = date.getDate();
                        
                        const dateStart = new Date(year, month, day);
                        const nowStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                        
                        const diffMs = nowStart - dateStart;
                        const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                        
                        if (diffDays <= 0) {
                            isNew = true;
                        }
                    } catch(e) {
                        console.error("Time parse error:", e);
                    }
                }
                
                // 呼吸绿点 UI (Moved next to Today)
                const newBadge = isNew ? `<span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse inline-block mr-1 flex-shrink-0"></span>` : '';
                
                // Render Tags
                let tagsHtml = '';
                if (item.tags && item.tags.length > 0) {
                    const debugTags = ['强医疗相关', 'AI增益', 'AI核心场景', '商业动态', '前沿资讯', '高可信信源'];
                    const validTags = item.tags.filter(tag => !debugTags.includes(tag));
                    
                    tagsHtml = validTags.slice(0, 3).map(tag => 
                        `<span class="px-2 py-0.5 rounded text-[9px] font-mono border border-border-color/50 text-text-muted hover:text-accent-primary transition-colors cursor-default">#${tag}</span>`
                    ).join('');
                }

                const isSaved = savedSignalIds.has(item.id);
                const bookmarkIcon = isSaved 
                    ? '<i class="fa-solid fa-bookmark text-accent text-sm"></i>' 
                    : '<i class="fa-regular fa-bookmark text-text-muted text-sm"></i>';

                return `
                <div class="signal-card group border-b border-border-color/30 last:border-0 py-5 cursor-pointer hover:bg-bg-secondary/20 transition-all rounded-lg px-2 -mx-2 relative" data-url="${item.url}" data-signal-id="${item.id}" onclick="openDrawerByUrl(this.getAttribute('data-url'))">
                    <div class="flex justify-between items-start mb-2 gap-4">
                        <div class="flex items-center gap-2 flex-wrap flex-1">
                            <span class="text-[10px] font-semibold tracking-wider px-2 py-0.5 rounded border ${color} uppercase flex items-center gap-1.5 flex-shrink-0">
                                <span class="w-1.5 h-1.5 rounded-full bg-current opacity-80"></span>
                                ${item.category}
                            </span>
                            <span class="text-xs text-text-muted flex items-center gap-1 line-clamp-1">
                                ${item.source}
                            </span>
                        </div>
                        <div class="flex items-center gap-2 flex-shrink-0 ml-2">
                            <button onclick="event.stopPropagation(); event.preventDefault(); toggleSaveSignal('${item.id}', this)" class="bookmark-btn p-1 rounded hover:bg-bg-secondary/50 transition-colors" data-signal-id="${item.id}">
                                ${bookmarkIcon}
                            </button>
                            <span class="text-[10px] font-mono flex items-center ${isNew ? 'text-emerald-400/90' : 'text-text-muted'} whitespace-nowrap group-hover:text-accent-primary transition-colors">
                                ${newBadge}${timeStr}
                            </span>
                        </div>
                    </div>
                    <h3 class="text-sm md:text-base font-bold text-text-primary group-hover:text-white transition-colors leading-snug mb-2 line-clamp-2">
                        ${item.title}
                    </h3>
                    <p class="text-xs text-text-secondary leading-relaxed line-clamp-2 mb-3">
                        ${item.summary}
                    </p>
                    <div class="flex flex-wrap gap-2">
                        ${tagsHtml}
                    </div>
                </div>
                `;
            }).join('');
            
            if (isAppend) {
                // Remove loading indicator if any
                const loader = container.querySelector('.animate-pulse');
                if (loader) loader.remove();
                
                // Remove the old load-more trigger before appending new content
                const oldTrigger = container.querySelector('#load-more-trigger');
                if (oldTrigger) oldTrigger.remove();
                
                container.insertAdjacentHTML('beforeend', html);
            } else {
                container.innerHTML = html;
            }
            
            if (hasMore) {
                container.insertAdjacentHTML('beforeend', `<div id="load-more-trigger" class="h-10 w-full flex items-center justify-center text-text-muted text-xs">Loading more...</div>`);
                setupIntersectionObserver();
            }
        }
        
        let observer = null;
        function setupIntersectionObserver() {
            const trigger = document.getElementById('load-more-trigger');
            if (!trigger) return;
            
            if (observer) {
                observer.disconnect();
            }
            
            observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting) {
                    currentPage++;
                    fetchData(true);
                }
            }, { root: document.getElementById('signal-container'), rootMargin: '100px' });
            
            observer.observe(trigger);
        }

        // Variables to store original text for translation toggle
        let originalTitle = '';
        let originalContent = '';
        let currentItemLang = 'zh'; // Default
        let currentItem = null;
        
        // Helper function to update drawer bookmark UI state
        function getBookmarkIconMarkup(isSaved, sizeClass = 'text-sm') {
            return isSaved
                ? `<i class="fa-solid fa-bookmark text-accent ${sizeClass}"></i>`
                : `<i class="fa-regular fa-bookmark text-text-muted ${sizeClass}"></i>`;
        }

        function updateDrawerBookmarkUI(signalId) {
            const isSaved = savedSignalIds.has(signalId);
            const desktopBtn = document.getElementById('drawer-bookmark-btn');

            if (desktopBtn) {
                desktopBtn.innerHTML = getBookmarkIconMarkup(isSaved, 'text-base md:text-lg');
                desktopBtn.classList.toggle('is-saved', isSaved);
                desktopBtn.setAttribute('data-signal-id', signalId || '');
            }
        }

        function syncBookmarkUI(signalId) {
            document.querySelectorAll(`.bookmark-btn[data-signal-id="${signalId}"]`).forEach((btn) => {
                btn.innerHTML = getBookmarkIconMarkup(savedSignalIds.has(signalId), 'text-sm');
            });

            if (currentItem?.id === signalId) {
                updateDrawerBookmarkUI(signalId);
            }
        }

        // --- Drawer Logic ---
        window.openDrawerByUrl = function(url) {
            // Find the item by url (safest unique key across DB and local JSON)
            const item = allData.find(d => d.url === url);
            if (!item) {
                console.error("Item not found for url:", url);
                return;
            }
            currentItem = item;
            
            // Populate Drawer Data
            originalTitle = item.title;
            currentItemLang = item.lang || 'zh';
            
            document.getElementById('drawer-category').textContent = item.category;
            document.getElementById('drawer-category').className = `text-[10px] font-semibold tracking-wider px-2 py-1 rounded border uppercase flex items-center gap-1.5 ${getCategoryColor(item.category)}`;
            document.getElementById('drawer-category').innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-current opacity-80"></span>${item.category}`;
            
            document.getElementById('drawer-source').innerHTML = `<i class="fas fa-globe mr-1"></i>${item.source}`;
            document.getElementById('drawer-title').textContent = item.title;
            
            // Set current drawer item ID for bookmarking
            updateDrawerBookmarkUI(item.id);
            
            // Format time for drawer to show only YYYY-MM-DD
            let drawerTime = item.time || '';
            try {
                if (drawerTime) {
                    const d = new Date(drawerTime);
                    if (!isNaN(d.getTime())) {
                        const year = d.getFullYear();
                        const month = String(d.getMonth() + 1).padStart(2, '0');
                        const day = String(d.getDate()).padStart(2, '0');
                        drawerTime = `${year}-${month}-${day}`;
                    } else {
                        drawerTime = drawerTime.split('T')[0].split(' ')[0];
                    }
                }
            } catch (e) {
                drawerTime = drawerTime.split('T')[0].split(' ')[0];
            }
            document.getElementById('drawer-time').innerHTML = `<i class="far fa-clock mr-1"></i>${drawerTime}`;
            
            // Inject Full Content if available, else fallback to summary
            const contentContainer = document.getElementById('drawer-full-content');
            if (item.full_content && item.full_content.trim() !== '') {
                // If the full_content is just plain text (doesn't start with <), wrap it in paragraphs
                let content = item.full_content;
                if (!content.trim().startsWith('<')) {
                    content = content.split('\n').map(p => `<p>${p}</p>`).join('');
                }
                originalContent = content;
                contentContainer.innerHTML = content;
            } else {
                originalContent = `<p class="italic text-text-muted">${item.summary}</p>`;
                contentContainer.innerHTML = originalContent;
            }
            
            document.getElementById('drawer-link').href = item.url;

            // Render Tags in Drawer
            const tagsContainer = document.getElementById('drawer-tags');
            if (item.tags && item.tags.length > 0) {
                const debugTags = ['强医疗相关', 'AI增益', 'AI核心场景', '商业动态', '前沿资讯', '高可信信源'];
                const validTags = item.tags.filter(tag => !debugTags.includes(tag));
                
                tagsContainer.innerHTML = validTags.slice(0, 5).map(tag => 
                    `<span class="px-2 py-1 rounded-md text-[10px] font-mono bg-bg-secondary text-text-secondary border border-border-color">#${tag}</span>`
                ).join('');
            } else {
                tagsContainer.innerHTML = '';
            }

            // Show Drawer
            const drawer = document.getElementById('article-drawer');
            const backdrop = document.getElementById('drawer-backdrop');
            
            // Scroll drawer content to top
            const drawerScrollContainer = drawer.querySelector('.overflow-y-auto');
            if (drawerScrollContainer) {
                drawerScrollContainer.scrollTop = 0;
            }
            
            drawer.classList.remove('translate-x-full');
            backdrop.classList.remove('hidden');
            // Small delay for transition
            setTimeout(() => {
                backdrop.classList.remove('opacity-0');
            }, 10);
            
            // Prevent body scroll
            document.body.style.overflow = 'hidden';
        }

        function closeDrawer() {
            const drawer = document.getElementById('article-drawer');
            const backdrop = document.getElementById('drawer-backdrop');
            
            drawer.classList.add('translate-x-full');
            backdrop.classList.add('opacity-0');
            
            setTimeout(() => {
                backdrop.classList.add('hidden');
                document.body.style.overflow = ''; // Restore scroll
            }, 300);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('translate-y-10', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
            }, 3000);
        }

        // Helpers
        function getCategoryColor(cat) {
            const map = {
                'Insights': 'text-amber-400 bg-amber-400/10 border-amber-400/20',
                'Product': 'text-purple-400 bg-purple-400/10 border-purple-400/20',
                'Clinical': 'text-emerald-400 bg-emerald-400/10 border-emerald-400/20',
                'Market': 'text-orange-400 bg-orange-400/10 border-orange-400/20',
                'Policy': 'text-blue-400 bg-blue-400/10 border-blue-400/20',
                'General': 'text-slate-400 bg-slate-400/10 border-slate-400/20'
            };
            return map[cat] || map['General'];
        }

        function formatTime(timeStr) {
            // Display friendly relative time
            if (!timeStr) return '';
            
            try {
                // Handle ISO string from Supabase (e.g., "2026-03-16T01:32:00+00:00")
                const date = new Date(timeStr);
                const now = new Date();
                
                // Get local YYYY-MM-DD
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const datePart = `${year}-${month}-${day}`;
                
                // Calculate difference in days (using start of day to avoid time-of-day edge cases)
                const dateStart = new Date(year, date.getMonth(), date.getDate());
                const nowStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const diffMs = nowStart - dateStart;
                const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                
                if (diffDays === 0) {
                    return 'Today';
                } else if (diffDays === 1) {
                    return 'Yesterday';
                } else if (diffDays < 0) {
                    // Future date (likely timezone discrepancy or bad data), just show Today
                    return 'Today';
                } else if (diffDays < 7) {
                    return diffDays + ' days ago';
                } else {
                    return datePart;
                }
            } catch (e) {
                return timeStr.split('T')[0] || timeStr;
            }
        }

        // --- Auth State Management ---
        let currentUser = null;
        let savedSignalIds = new Set();

        async function initAuth() {
            if (!supabaseClient) return;
            const pendingAuthRedirect = hasPendingAuthRedirect();
            const pendingLogin = localStorage.getItem(AUTH_LOGIN_PENDING_KEY) === '1';
            const pendingLogout = localStorage.getItem(AUTH_LOGOUT_PENDING_KEY) === '1';

            // Check if user is already logged in (session persists)
            let { data: { session } } = await supabaseClient.auth.getSession();
            if ((pendingAuthRedirect || pendingLogin) && !session?.user) {
                session = await waitForSessionReady();
            }

            if (session?.user) {
                currentUser = session.user;
                updateAuthUI(true);
                await loadSavedSignals();
                if ((pendingAuthRedirect || pendingLogin) && shouldForceAuthReload()) {
                    markAuthReloadDone();
                    clearAuthPending();
                    cleanupAuthRedirectUrl();
                    reloadToCleanCurrentPage();
                    return;
                }
            }

            if (pendingLogout && shouldForceAuthReload()) {
                markAuthReloadDone();
                clearAuthPending();
                reloadToCleanCurrentPage();
                return;
            }

            // Listen for auth state changes (this catches the implicit flow token parsing)
            supabaseClient.auth.onAuthStateChange(async (event, newSession) => {
                if (event === 'SIGNED_IN' && newSession?.user) {
                    currentUser = newSession.user;
                    updateAuthUI(true);
                    await loadSavedSignals();
                    if ((hasPendingAuthRedirect() || localStorage.getItem(AUTH_LOGIN_PENDING_KEY) === '1') && shouldForceAuthReload()) {
                        markAuthReloadDone();
                        clearAuthPending();
                        cleanupAuthRedirectUrl();
                        reloadToCleanCurrentPage();
                    }
                } else if (event === 'SIGNED_OUT') {
                    currentUser = null;
                    savedSignalIds.clear();
                    updateAuthUI(false);
                    if (localStorage.getItem(AUTH_LOGOUT_PENDING_KEY) === '1' && shouldForceAuthReload()) {
                        markAuthReloadDone();
                        clearAuthPending();
                        reloadToCleanCurrentPage();
                    }
                }
            });

            // Give Supabase client a moment to process the URL hash before we clean it up
            if (pendingAuthRedirect) {
                setTimeout(() => {
                    cleanupAuthRedirectUrl();
                }, 1000);
            }

            if (!pendingLogin && !pendingLogout && !pendingAuthRedirect) {
                clearAuthPending();
                sessionStorage.removeItem(AUTH_RELOAD_DONE_KEY);
            }
        }

        function updateAuthUI(isLoggedIn) {
            const authUserEl = document.getElementById('auth-user');
            const loginBtn = document.getElementById('login-btn');
            const savedBtn = document.getElementById('saved-filter-btn');

            if (isLoggedIn && currentUser) {
                authUserEl.classList.remove('hidden');
                authUserEl.classList.add('flex');
                loginBtn.classList.add('hidden');
                savedBtn.classList.remove('hidden'); // Show Saved tab

                // Set avatar and name
                const avatarEl = document.getElementById('user-avatar');
                const nameEl = document.getElementById('user-name');
                if (currentUser.user_metadata?.avatar_url) {
                    avatarEl.src = currentUser.user_metadata.avatar_url;
                } else if (currentUser.app_metadata?.provider === 'github') {
                    avatarEl.src = `https://avatars.githubusercontent.com/u/${currentUser.app_metadata?.provider_id || currentUser.id}`;
                }
                nameEl.innerText = currentUser.user_metadata?.full_name || currentUser.email?.split('@')[0] || 'User';
            } else {
                authUserEl.classList.add('hidden');
                authUserEl.classList.remove('flex');
                loginBtn.classList.remove('hidden');
                savedBtn.classList.add('hidden'); // Hide Saved tab
            }
        }

        // Toggle user dropdown
        document.getElementById('user-menu-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            const dropdown = document.getElementById('user-dropdown');
            dropdown.classList.toggle('hidden');
        });
        document.addEventListener('click', () => {
            document.getElementById('user-dropdown').classList.add('hidden');
        });

        async function signInWithGitHub() {
            if (!supabaseClient) {
                showToast('Supabase not configured', 'error');
                return;
            }
            markAuthPending('login');
            closeLoginModal();
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'github',
                options: {
                    redirectTo: getAuthRedirectUrl()
                }
            });
            if (error) {
                clearAuthPending();
                showToast('Sign in failed: ' + error.message, 'error');
            }
        }

        async function signOut() {
            if (!supabaseClient) return;
            markAuthPending('logout');
            const { error } = await supabaseClient.auth.signOut();
            if (error) {
                clearAuthPending();
                showToast('Sign out failed', 'error');
                return;
            }
            document.getElementById('user-dropdown').classList.add('hidden');
            if (shouldForceAuthReload()) {
                markAuthReloadDone();
                clearAuthPending();
                reloadToCleanCurrentPage();
            }
        }

        function showLoginModal() {
            const modal = document.getElementById('login-modal');
            if (!modal) return;
            modal.classList.add('is-open');
            modal.setAttribute('aria-hidden', 'false');
            document.body.classList.add('modal-open');
        }

        function closeLoginModal() {
            const modal = document.getElementById('login-modal');
            if (!modal) return;
            modal.classList.remove('is-open');
            modal.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('modal-open');
        }

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeLoginModal();
            }
        });

        // --- Saved Signals Logic ---
        async function loadSavedSignals() {
            if (!supabaseClient || !currentUser) return;
            savedSignalIds.clear();
            const { data, error } = await supabaseClient
                .from('saved_signals')
                .select('signal_id')
                .eq('user_id', currentUser.id);
            if (!error && data) {
                data.forEach(row => savedSignalIds.add(row.signal_id));
                // Refresh UI to show filled bookmarks
                refreshBookmarkUI();
            }
        }

        function refreshBookmarkUI() {
            document.querySelectorAll('.bookmark-btn').forEach(btn => {
                const signalId = btn.dataset.signalId;
                btn.innerHTML = getBookmarkIconMarkup(savedSignalIds.has(signalId), 'text-sm');
            });
            if (currentItem?.id) {
                updateDrawerBookmarkUI(currentItem.id);
            }
        }

        async function toggleSaveSignalFromDrawer() {
            const signalId = currentItem?.id || document.getElementById('drawer-bookmark-btn')?.getAttribute('data-signal-id');
            if (!signalId) return;
            await toggleSaveSignal(signalId);
        }

        async function toggleSaveSignal(signalId, btn = null) {
            if (!supabaseClient || !currentUser) {
                showToast('请先登录后再收藏', 'info');
                showLoginModal();
                return;
            }

            const isSaved = savedSignalIds.has(signalId);

            if (isSaved) {
                const { error } = await supabaseClient
                    .from('saved_signals')
                    .delete()
                    .eq('user_id', currentUser.id)
                    .eq('signal_id', signalId);
                if (!error) {
                    savedSignalIds.delete(signalId);
                    if (btn) {
                        btn.innerHTML = getBookmarkIconMarkup(false, 'text-sm');
                    }
                    syncBookmarkUI(signalId);
                    showToast('已取消收藏', 'info');
                    // If we're on saved page, remove the card
                    if (currentFilter === 'saved') {
                        const card = document.querySelector(`.signal-card[data-signal-id="${signalId}"]`);
                        if (card) card.remove();
                    }
                }
            } else {
                const { error } = await supabaseClient
                    .from('saved_signals')
                    .insert({ user_id: currentUser.id, signal_id: signalId });
                if (!error) {
                    savedSignalIds.add(signalId);
                    if (btn) {
                        btn.innerHTML = getBookmarkIconMarkup(true, 'text-sm');
                    }
                    syncBookmarkUI(signalId);
                    showToast('已收藏', 'success');
                }
            }
        }

        async function navigateToSaved() {
            if (!currentUser) {
                showToast('登录后查看跨设备收藏', 'info');
                showLoginModal();
                return;
            }
            document.getElementById('user-dropdown').classList.add('hidden');
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            const savedBtn = document.getElementById('saved-filter-btn');
            savedBtn.classList.add('active');
            currentFilter = 'saved';
            currentPage = 0;
            fetchData(false);
        }

        async function fetchSavedSignals() {
            if (!supabaseClient || !currentUser) return { data: [], error: 'Not logged in' };
            // Fetch all saved signal_ids for this user
            const { data: savedRows, error: savedError } = await supabaseClient
                .from('saved_signals')
                .select('signal_id, created_at')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });

            if (savedError) return { data: [], error: savedError.message };

            if (!savedRows || savedRows.length === 0) return { data: [], error: null };

            const signalIds = savedRows.map(r => r.signal_id);
            const signalIdToSavedAt = {};
            savedRows.forEach(r => signalIdToSavedAt[r.signal_id] = r.created_at);

            // Fetch full signal details
            const { data: signals, error: signalsError } = await supabaseClient
                .from('signals')
                .select('*')
                .in('id', signalIds);

            if (signalsError) return { data: [], error: signalsError.message };

            // Maintain saved order
            const orderedSignals = signalIds.map(id => signals.find(s => s.id === id)).filter(Boolean);
            return { data: orderedSignals, error: null };
        }

        // Toast helper
        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            const toastIcon = toast.querySelector('i');
            toastMsg.innerText = msg;
            if (type === 'success') {
                toastIcon.className = 'fas fa-check-circle text-emerald-400';
            } else if (type === 'error') {
                toastIcon.className = 'fas fa-exclamation-circle text-rose-400';
            } else {
                toastIcon.className = 'fas fa-info-circle text-accent';
            }
            toast.classList.remove('translate-y-10', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
            }, 2500);
        }

        // --- Update Filter Logic for Saved ---
        document.getElementById('feed-filters').addEventListener('click', (e) => {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;

            // UI
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const filter = btn.dataset.filter;
            currentFilter = filter;
            currentPage = 0;

            // Handle Saved specially
            if (filter === 'saved') {
                if (!currentUser) {
                    showToast('登录后查看跨设备收藏', 'info');
                    showLoginModal();
                    return;
                }
                fetchData(false);
            } else {
                fetchData(false);
            }

            // Scroll back to top
            const signalContainer = document.getElementById('signal-container');
            if (signalContainer) {
                signalContainer.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
            }
        });

        // Search Input Debounce (Desktop)
        let searchTimeout;
        document.getElementById('search-input').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchQuery = e.target.value.trim();
                currentPage = 0;
                fetchData(false);
            }, 500);
        });

        // Search Input Debounce (Mobile Inline)
        const mobileInlineSearch = document.getElementById('search-input-mobile-inline');
        if (mobileInlineSearch) {
            mobileInlineSearch.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    searchQuery = e.target.value.trim();
                    currentPage = 0;
                    fetchData(false);
                }, 500);
            });
        }

        // Init
        initAuth();
        fetchData(false);

    </script>
