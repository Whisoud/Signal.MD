name: Update AI News

on:
  schedule:
    # 1. 实时流：每 2 小时运行一次 (UTC 时间)
    - cron: '0 */2 * * *'
    # 2. 每日晨报：每天北京时间 05:00 (UTC 21:00)
    - cron: '0 21 * * *'
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser

    - name: Run Scraper (Live Feed)
      env:
        # 优先使用 GitHub Secrets 中的 Key，如果没有则代码会使用硬编码的默认值
        QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        # DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }} # 暂时注释
      run: |
        python scraper.py

    - name: Run Daily Brief (Morning Report)
      # 只有在 UTC 21:00 (北京时间 05:00) 或手动触发时运行
      if: github.event.schedule == '0 21 * * *' || github.event_name == 'workflow_dispatch'
      env:
        QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        # DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }} # 暂时注释
      run: |
        python daily_brief.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/news.json data/daily_brief.json
        git commit -m "Auto update news: $(date)" || exit 0
        git push
