name: Signal.MD Data Ingestion Pipeline

on:
  schedule:
    # 运行时间：北京时间 09:00, 12:00, 18:00, 00:00
    # 对应 UTC 时间：01:00, 04:00, 10:00, 16:00
    - cron: '0 */4 * * *' # 确保每4小时轮询到所有Tier2关键词批次
  workflow_dispatch: # 允许手动触发

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 缓存 pip 依赖加速构建
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python scraper.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
        git add data/news.json
        # 如果没有变动，commit 会失败，使用 || true 避免 workflow 报错
        git commit -m "Auto update data: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || true
        # 强制拉取最新的远程代码进行合并，防止我们在本地修改代码后导致 Actions 推送失败
        git pull --rebase origin main || true
        git push
